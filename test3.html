<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng Hợp Nhóm Zalo Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a0e17;
            --card-bg: rgba(20, 30, 48, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #007aff; /* Zalo Blue */
            --accent-glow: rgba(0, 122, 255, 0.4);
            --text-color: #ffffff;
            --text-muted: #8a99ad;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1a2639 0%, var(--bg-color) 70%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00d2ff 0%, #0066ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0, 102, 255, 0.2);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Server Card Base Style */
        .server-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .server-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #0066ff, #00d2ff);
            opacity: 0.7;
        }

        /* Liên Server Style */
        .server-card.lien-server::before {
            background: linear-gradient(90deg, #ffaa00, #ff5500);
        }

        .server-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 102, 255, 0.4);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 15px rgba(0, 102, 255, 0.1);
        }

        .server-card.lien-server:hover {
            border-color: rgba(255, 170, 0, 0.4);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 170, 0, 0.1);
        }

        .server-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .server-title {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .server-title i {
            color: #00d2ff;
        }

        .server-card.lien-server .server-title {
            color: #ffaa00;
        }

        .server-card.lien-server .server-title i {
            color: #ffaa00;
        }

        .server-status {
            font-size: 0.75rem;
            padding: 4px 8px;
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid rgba(0, 255, 102, 0.3);
            color: #00ff66;
            border-radius: 20px;
            font-weight: 600;
        }

        .server-card.lien-server .server-status {
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid rgba(255, 170, 0, 0.3);
        }

        .box-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .zalo-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            text-decoration: none;
            padding: 12px 8px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .zalo-btn:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-glow);
            transform: scale(1.05);
        }

        .server-card.lien-server .zalo-btn:hover {
            background: #ffaa00;
            border-color: #ffaa00;
            box-shadow: 0 0 12px rgba(255, 170, 0, 0.4);
        }

        .zalo-btn i {
            margin-right: 4px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .loading-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            grid-column: 1 / -1;
            padding: 50px;
        }

        @media (max-width: 480px) {
            .box-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Cộng Đồng Zalo Game</h1>
        <p>Chọn Server và tham gia các Box Chat để giao lưu, giao dịch</p>
    </header>

    <div class="container" id="serverContainer">
        <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải cấu hình nhóm từ hệ thống...</div>
    </div>

    <script>
        // Hàm tự động fetch dữ liệu từ link API của bạn và render giao diện
        async function loadZaloGroups() {
            const container = document.getElementById('serverContainer');
            try {
                const response = await fetch('https://sv7.thanhdi.games/page?e=zalo');
                if (!response.ok) throw new Error('Không thể fetch dữ liệu từ endpoint');
                
                const data = await response.json();
                container.innerHTML = ''; // Xóa thông báo loading

                // Tự động tối ưu hóa cấu trúc dữ liệu trả về (hỗ trợ cả dạng Mảng hoặc Object phân theo Server)
                if (Array.isArray(data)) {
                    const groupedServers = {};
                    data.forEach(item => {
                        const sName = item.server || item.server_name || "Server Gốc";
                        if (!groupedServers[sName]) groupedServers[sName] = [];
                        groupedServers[sName].push(item);
                    });
                    renderServers(groupedServers, container);
                } else {
                    renderServers(data, container);
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="loading-text" style="color: #ff3333;">
                        <i class="fa-solid fa-circle-exclamation"></i> Không thể kết nối dữ liệu từ API.<br>
                        <span style="font-size: 0.9rem; color: var(--text-muted);">Vui lòng kiểm tra cấu hình CORS trên server hoặc định dạng JSON trả về.</span>
                    </div>`;
            }
        }

        // Xử lý render thẻ UI dựa vào cấu trúc dữ liệu thu thập được
        function renderServers(servers, container) {
            Object.keys(servers).forEach(serverName => {
                const boxes = servers[serverName];
                const isLienServer = serverName.toLowerCase().includes('liên');
                
                const card = document.createElement('div');
                card.className = `server-card ${isLienServer ? 'lien-server' : ''}`;
                
                let boxButtonsHTML = '';
                boxes.forEach(box => {
                    const btnName = box.name || box.box || box.title || 'Box';
                    const btnLink = box.link || box.url || '#';
                    boxButtonsHTML += `<a href="${btnLink}" target="_blank" class="zalo-btn"><i class="fa-solid fa-users"></i> ${btnName}</a>`;
                });

                card.innerHTML = `
                    <div class="server-header">
                        <div class="server-title">
                            <i class="fa-solid ${isLienServer ? 'fa-globe' : 'fa-server'}"></i> ${serverName}
                        </div>
                        <div class="server-status">${isLienServer ? 'Hot' : 'Online'}</div>
                    </div>
                    <div class="box-grid">
                        ${boxButtonsHTML}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Thực thi ngay khi cây DOM sẵn sàng
        document.addEventListener('DOMContentLoaded', loadZaloGroups);
    </script>
</body>
</html>
